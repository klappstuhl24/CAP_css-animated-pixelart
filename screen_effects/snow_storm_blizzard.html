<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixelsnow — 3 Stages</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0d14;overflow:hidden}
#stage{width:100%;height:100vh;position:relative;overflow:hidden;background:#0a0d14}
canvas{display:block;position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
button{background:transparent;border:0.5px solid #aaccee;color:#aaccee;font-family:monospace;font-size:11px;padding:5px 14px;cursor:pointer;border-radius:3px}
button:hover:not(:disabled){background:#aaccee18}
button:disabled{opacity:0.25;cursor:default}
#lbl{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:#aaccee44;font-family:monospace;font-size:10px;letter-spacing:3px;pointer-events:none;transition:color 0.5s}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="lbl">IDLE</div>
  <div id="ui">
    <button id="b1">① Storm</button>
    <button id="b2">② Blizzard</button>
    <button id="b3" style="display:none">↺ Reset</button>
  </div>
</div>
<script>
const stage=document.getElementById('stage');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const b1=document.getElementById('b1');
const b2=document.getElementById('b2');
const b3=document.getElementById('b3');
const lbl=document.getElementById('lbl');

let W,H,t=0,lastTs=0;
let phase='idle';
let stormT=0,calmT=0,blizzardT=0,vanishT=0;
const STORM_DUR=90,CALM_DUR=80,BLIZZARD_DUR=140,VANISH_DUR=90;

const TIERS=[
  {sz:1,spd:0.20,drift:0.12,count:140,alpha:0.28,col:'#b8cce0'},
  {sz:2,spd:0.50,drift:0.28,count:80, alpha:0.55,col:'#d0e8f8'},
  {sz:3,spd:0.90,drift:0.48,count:40, alpha:0.82,col:'#e8f4ff'},
  {sz:4,spd:1.40,drift:0.70,count:18, alpha:0.95,col:'#f5faff'},
];

let flakes=[];
let windX=0,windT=0,windDir=1,windChangeCd=0;
let intensity=0,whiteout=0;

function rnd(a,b){return a+Math.random()*(b-a)}
function lerp(a,b,f){return a+(b-a)*f}

function resize(){W=stage.offsetWidth;H=stage.offsetHeight;canvas.width=W;canvas.height=H;}

function targetCount(tier,itn){
  const base=TIERS[tier].count;
  if(itn<=1) return Math.round(base*(1+itn*2.0));
  return Math.round(base*(3.0+(itn-1)*9));
}

function makeFlake(tier,forceTop=false){
  const cfg=TIERS[tier];
  return {
    tier,
    x:rnd(-20,W+20),
    y:forceTop?rnd(-40,-2):rnd(0,H),
    spd:cfg.spd*rnd(0.6,1.5),
    drift:cfg.drift*rnd(-1,1),
    wobble:rnd(0,Math.PI*2),
    wobbleSpd:rnd(0.008,0.035),
    wobbleAmp:rnd(0.15,0.9),
    alpha:cfg.alpha*rnd(0.7,1.0),
    fadeAlpha:1.0,
    alive:true,
    streaking:false,
    streakVx:0,streakVy:0,
  };
}

function initFlakes(){
  flakes=[];
  for(let tier=0;tier<TIERS.length;tier++)
    for(let i=0;i<TIERS[tier].count;i++) flakes.push(makeFlake(tier,false));
}

function getWindStrength(){
  if(intensity<=0) return 0.35;
  if(intensity<=1) return 0.35+intensity*2.2;
  return 2.55+Math.pow(intensity-1,1.6)*14;
}

function updateWind(dt){
  windT+=dt*0.009; windChangeCd-=dt;
  if(windChangeCd<=0){
    windDir=intensity>1.3?(Math.random()<0.8?1:-1):(Math.random()<0.5?-1:1);
    windChangeCd=rnd(40,160);
  }
  const str=getWindStrength();
  const gustFreq=1.2+intensity*0.8;
  const target=windDir*str*(0.55+Math.sin(windT*gustFreq)*0.45+Math.sin(windT*2.3)*0.2);
  windX=lerp(windX,target,0.025*dt);
}

function updateIntensity(dt){
  if(phase==='idle'){
    intensity=lerp(intensity,0,0.03*dt);
    whiteout=lerp(whiteout,0,0.04*dt);
  } else if(phase==='storming'){
    stormT+=dt;
    intensity=lerp(intensity,1,0.04*dt);
    if(stormT>=STORM_DUR){phase='calming';calmT=0;lbl.textContent='CALMING';}
  } else if(phase==='calming'){
    calmT+=dt;
    intensity=lerp(intensity,0,0.025*dt);
    if(calmT>=CALM_DUR){phase='idle';lbl.textContent='IDLE';b1.disabled=false;}
  } else if(phase==='blizzard'){
    blizzardT+=dt;
    intensity=lerp(intensity,3.0,0.045*dt);
    const wTarget=Math.max(0,(intensity-2.2)/0.8*0.55);
    whiteout=lerp(whiteout,wTarget,0.02*dt);
    if(blizzardT>=BLIZZARD_DUR){
      phase='vanishing';vanishT=0;
      lbl.textContent='VANISHING';lbl.style.color='#ffffff88';
    }
  } else if(phase==='vanishing'){
    vanishT+=dt;
    intensity=lerp(intensity,0,0.03*dt);
    whiteout=lerp(whiteout,0,0.025*dt);
    for(const f of flakes) f.fadeAlpha=Math.max(0,f.fadeAlpha-0.012*dt);
    if(vanishT>=VANISH_DUR){
      phase='done';
      for(const f of flakes) f.alive=false;
      lbl.textContent='DONE';lbl.style.color='#aaccee44';
      b1.style.display='none';b2.style.display='none';b3.style.display='inline-block';
    }
  }
}

function manageFlakeCount(dt){
  if(phase==='vanishing'||phase==='done') return;
  const countByTier=Array(TIERS.length).fill(0);
  for(const f of flakes) if(f.alive) countByTier[f.tier]++;
  for(let tier=0;tier<TIERS.length;tier++){
    const target=targetCount(tier,Math.min(intensity,3));
    const diff=target-countByTier[tier];
    if(diff>0){
      const batch=Math.min(diff,Math.ceil(diff*0.1*dt)+2);
      for(let i=0;i<batch;i++) flakes.push(makeFlake(tier,true));
    }
  }
  if(flakes.length>8000) flakes=flakes.filter(f=>f.alive);
}

function updateFlakes(dt){
  const dying=phase==='vanishing'||phase==='done';
  const iStr=Math.max(0,intensity);
  for(const f of flakes){
    if(!f.alive) continue;
    f.wobble+=f.wobbleSpd*dt;
    if(!dying&&iStr>1.5&&!f.streaking&&Math.random()<0.003*dt*(iStr-1)){
      f.streaking=true;
      f.streakVx=windX*rnd(1.2,2.2);
      f.streakVy=f.spd*rnd(0.3,1.2)*(iStr>2?2.5:1.5);
    }
    let vx,vy;
    if(f.streaking){
      vx=f.streakVx+Math.sin(f.wobble)*f.wobbleAmp*0.3;
      vy=f.streakVy;
      if(iStr>2) f.streakVx=lerp(f.streakVx,windX*2.5,0.01*dt);
    } else {
      const wx=windX*(TIERS[f.tier].spd/TIERS[0].spd)*0.9;
      vx=wx+f.drift+Math.sin(f.wobble)*f.wobbleAmp;
      vy=f.spd*(1+iStr*1.1);
    }
    f.x+=vx*dt; f.y+=vy*dt;
    if(!dying){
      if(f.x<-20) f.x=W+10;
      if(f.x>W+20) f.x=-10;
    }
    if(f.y>H+12){
      if(dying) f.alive=false;
      else{f.y=rnd(-30,-2);f.x=rnd(-20,W+20);f.streaking=false;}
    }
    if(f.streaking&&(f.x<-80||f.x>W+80)){
      if(dying) f.alive=false;
      else{f.x=rnd(-10,W+10);f.y=rnd(-20,0);f.streaking=false;}
    }
    if(f.y<-60) f.alive=false;
  }
}

function drawFlakes(){
  for(const f of flakes){
    if(!f.alive) continue;
    const cfg=TIERS[f.tier];
    const a=f.alpha*f.fadeAlpha;
    if(a<0.01) continue;
    const px=Math.round(f.x/cfg.sz)*cfg.sz;
    const py=Math.round(f.y/cfg.sz)*cfg.sz;
    if(f.streaking){
      const trailLen=Math.min(8,Math.floor(Math.abs(f.streakVx)*0.5+2));
      const dir=f.streakVx>0?-1:1;
      for(let i=0;i<trailLen;i++){
        ctx.globalAlpha=a*(1-i/trailLen)*0.85;
        ctx.fillStyle=cfg.col;
        ctx.fillRect(px+dir*i*cfg.sz,py,cfg.sz,cfg.sz);
      }
    } else {
      ctx.globalAlpha=a;
      ctx.fillStyle=cfg.col;
      ctx.fillRect(px,py,cfg.sz,cfg.sz);
      if(f.tier>=2&&a>0.4){
        ctx.globalAlpha=a*0.45;
        ctx.fillRect(px-cfg.sz,py,cfg.sz,cfg.sz);
        ctx.fillRect(px+cfg.sz,py,cfg.sz,cfg.sz);
        ctx.fillRect(px,py-cfg.sz,cfg.sz,cfg.sz);
        ctx.fillRect(px,py+cfg.sz,cfg.sz,cfg.sz);
      }
    }
  }
  ctx.globalAlpha=1;
}

function drawBg(){
  const bright=Math.min(intensity,3)/3;
  ctx.fillStyle=`rgb(${Math.round(10+bright*30)},${Math.round(13+bright*35)},${Math.round(20+bright*50)})`;
  ctx.fillRect(0,0,W,H);
}

function drawWhiteout(){
  if(whiteout<0.01) return;
  ctx.globalAlpha=whiteout*0.7;
  ctx.fillStyle='#ddeeff';
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=whiteout*0.25;
  const p=12;
  for(let x=0;x<W;x+=p) for(let y=0;y<H;y+=p)
    if(Math.random()<0.45){ctx.fillStyle=Math.random()>0.5?'#ffffff':'#c8e0f8';ctx.fillRect(x,y,p,p);}
  ctx.globalAlpha=1;
}

function animate(ts){
  requestAnimationFrame(animate);
  const dt=Math.min((ts-lastTs)/16.67,3);
  lastTs=ts; t+=dt;
  updateIntensity(dt);
  updateWind(dt);
  manageFlakeCount(dt);
  updateFlakes(dt);
  drawBg();
  drawFlakes();
  drawWhiteout();
}

// ── PUBLIC API ──────────────────────────────────────────────
// snowStorm():    idle → storm → calm → idle (repeatable)
// snowBlizzard(): any → blizzard → vanish → done (destructive)

window.snowStorm=function(){
  if(phase==='blizzard'||phase==='vanishing'||phase==='done') return;
  phase='storming';stormT=0;lbl.textContent='STORM';lbl.style.color='#aaccee88';b1.disabled=true;
};
window.snowBlizzard=function(){
  if(phase==='vanishing'||phase==='done') return;
  phase='blizzard';blizzardT=0;lbl.textContent='BLIZZARD';lbl.style.color='#ffffff99';
  b1.disabled=true;b2.disabled=true;
};

function init(){
  phase='idle';stormT=0;calmT=0;blizzardT=0;vanishT=0;
  intensity=0;windX=0;windDir=1;windChangeCd=0;whiteout=0;
  lbl.textContent='IDLE';lbl.style.color='#aaccee44';
  b1.disabled=false;b1.style.display='inline-block';
  b2.disabled=false;b2.style.display='inline-block';
  b3.style.display='none';
  resize();initFlakes();
}

b1.addEventListener('click',()=>window.snowStorm());
b2.addEventListener('click',()=>window.snowBlizzard());
b3.addEventListener('click',()=>init());
window.addEventListener('resize',()=>init());

resize();
requestAnimationFrame((ts)=>{lastTs=ts;animate(ts);});
init();
</script>
</body>
</html>
